<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/oatcss/dist/oat.min.css" />
    <link rel="stylesheet" href="css/oat-bridge.css" />
    <title>Settings & Backup</title>
    <link rel="stylesheet" href="css/sync.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <div class="title">Backup</div>
        <div class="subtitle">Save snapshot or upload snapshot</div>
      </div>
      <a class="btn ghost" href="index.html">Back to Home</a>
    </header>

    <main class="stack">
      <section class="card">
        <div class="section-title">1) Save Current Snapshot</div>
        <div class="row">
          <label for="snapshotTarget">Save to</label>
          <select id="snapshotTarget">
            <option value="server">Server</option>
            <option value="device">My Device</option>
          </select>
          <button class="btn primary" id="saveSnapshotBtn" type="button">Save Snapshot</button>
        </div>
        <div class="hint">Filename format: <code>server_state_YYYYMMDD_HHMMSS.json</code></div>
      </section>

      <section class="card">
        <div class="section-title">2) Upload Snapshot</div>
        <div class="row">
          <input id="snapshotUploadInput" type="file" accept="application/json" />
          <button class="btn" id="uploadSnapshotBtn" type="button">Upload Snapshot</button>
        </div>
        <div class="hint">Uploads selected JSON snapshot to server backup storage.</div>
      </section>

      <section class="card">
        <div class="status" id="backupStatus">Ready.</div>
      </section>
    </main>

    <script src="js/version.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/agent-chat.js"></script>
  </body>
</html>
