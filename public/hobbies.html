<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hobbies Tracker</title>
    <link rel="stylesheet" href="css/hobbies.css" />
    <link rel="stylesheet" href="css/ui-system.css" />
    <link rel="stylesheet" href="css/terminal-overrides.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <div class="title">
          <a class="dashboard-home" href="index.html">Dashboard</a>
          <span id="headerVersion" class="header-version">v0.0.0</span>
        </div>
        <div class="subtitle">Long-press a tile to mark it complete</div>
      </div>
      <div class="topbar-actions">
        <button id="themeToggle" class="btn ghost" type="button" aria-pressed="false">
          Theme: Dark
        </button>
        <a class="btn ghost" href="index.html">Back to Home</a>
      </div>
    </header>

    <nav class="module-menu" aria-label="Modules">
      <a class="module-btn" href="index.html">Overview</a>
      <a class="module-btn" href="todo.html">To-Do</a>
      <a class="module-btn" href="projects.html">Projects</a>
      <a class="module-btn" href="calendar.html">Calendar</a>
      <a class="module-btn is-active" href="hobbies.html" aria-current="page">Hobbies</a>
      <a class="module-btn" href="journal.html">Journal</a>
      <a class="module-btn" href="links.html">Links</a>
      <a class="module-btn" href="pomodoro.html">Pomodoro</a>
      <a class="module-btn" href="sync.html">Settings</a>
      <a class="module-btn" href="resume.html">Resume</a>
    </nav>

    <main class="stack">
      <section class="card collapsible-card">
        <div class="card-header">
          <div class="section-title">Add a hobby</div>
          <button class="btn icon" id="hobbyFormToggle" type="button" aria-expanded="false">
            +
          </button>
        </div>
        <div class="collapsible collapsed" id="hobbyFormWrap">
          <form id="hobbyForm" class="form">
            <label class="field">
              <span>Hobby name</span>
              <input id="hobbyName" type="text" placeholder="Hobby name" required />
            </label>
            <label class="field">
              <span>Type</span>
              <select id="hobbyType">
                <option value="music">Music</option>
                <option value="fitness">Fitness</option>
                <option value="art">Art</option>
                <option value="learning">Learning</option>
                <option value="mindfulness">Mindfulness</option>
                <option value="craft">Craft</option>
                <option value="custom">Custom</option>
              </select>
            </label>
            <label class="field">
              <span>Custom icon (emoji)</span>
              <input id="hobbyIcon" type="text" placeholder="icon" />
            </label>
            <label class="field">
              <span>Approx time (minutes)</span>
              <input id="hobbyTime" type="number" min="5" max="480" value="30" />
            </label>
            <button class="btn primary" type="submit">Save hobby</button>
            <div class="form-actions">
              <button class="btn hidden" id="hobbyDelete" type="button">Delete hobby</button>
              <button class="btn" id="hobbyCancel" type="button">Cancel edit</button>
            </div>
          </form>
        </div>
      </section>

      <section class="card">
        <div class="section-title">Your hobbies</div>
        <div class="hint">Tip: long-press a card to mark today as complete.</div>
        <div id="hobbyGrid" class="hobby-grid"></div>
      </section>
    </main>
    <script src="js/version.js"></script>
    <script src="js/header.js"></script>
    <script src="js/theme-toggle.js"></script>

    <script src="js/storage.js"></script>
    <script src="js/hobbies.js"></script>
  </body>
</html>
