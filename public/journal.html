<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Journal</title>
    <link rel="stylesheet" href="css/journal.css" />
    <link rel="stylesheet" href="css/ui-system.css" />
    <link rel="stylesheet" href="css/terminal-overrides.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <div class="title">
          <a class="dashboard-home" href="index.html">Dashboard</a>
          <span id="headerVersion" class="header-version">v0.0.0</span>
        </div>
        <div class="subtitle">Capture ideas and link them to your work</div>
      </div>
      <div class="topbar-actions">
        <button id="themeToggle" class="btn ghost" type="button" aria-pressed="false">
          Theme: Dark
        </button>
        <a class="btn ghost" href="index.html">Back to Home</a>
      </div>
    </header>

    <nav class="module-menu" aria-label="Modules">
      <a class="module-btn" href="index.html">Overview</a>
      <a class="module-btn" href="todo.html">To-Do</a>
      <a class="module-btn" href="projects.html">Projects</a>
      <a class="module-btn" href="calendar.html">Calendar</a>
      <a class="module-btn" href="hobbies.html">Hobbies</a>
      <a class="module-btn is-active" href="journal.html" aria-current="page">Journal</a>
      <a class="module-btn" href="links.html">Links</a>
      <a class="module-btn" href="pomodoro.html">Pomodoro</a>
      <a class="module-btn" href="sync.html">Settings</a>
      <a class="module-btn" href="resume.html">Resume</a>
    </nav>

    <main class="stack">
      <section class="card collapsible-card">
        <div class="card-header">
          <div class="section-title">Daily entry</div>
          <button class="btn icon" id="journalFormToggle" type="button" aria-expanded="false">
            +
          </button>
        </div>
        <div class="collapsible collapsed" id="journalFormWrap">
          <div class="date-nav">
            <button class="btn" id="prevDay" type="button">&lt;</button>
            <input id="entryDate" type="date" />
            <button class="btn" id="nextDay" type="button">&gt;</button>
          </div>
          <form id="journalForm" class="form">
            <label class="field">
              <span>Title</span>
              <input id="entryTitle" type="text" placeholder="Today in one line" />
            </label>
            <label class="field">
              <span>Details</span>
              <textarea
                id="entryBody"
                rows="8"
                placeholder="What do you want to do? What did you do?"
              ></textarea>
            </label>
            <div class="suggestions" id="suggestions"></div>
            <label class="field">
              <span>Tags (comma separated)</span>
              <input id="entryTags" type="text" placeholder="reflection, deep work, notes" />
            </label>
            <div class="field">
              <span>Linked items</span>
              <div id="linkedItems" class="linked-items"></div>
            </div>
            <button class="btn primary" type="submit">Save entry</button>
          </form>
        </div>
      </section>

      <section class="card">
        <div class="section-title">Recent entries</div>
        <div class="filters">
          <input id="searchInput" type="search" placeholder="Search entries..." />
          <button class="btn" id="refreshLinks" type="button">Refresh items</button>
        </div>
        <div id="entriesList" class="entries"></div>
      </section>
    </main>
    <script src="js/version.js"></script>
    <script src="js/header.js"></script>
    <script src="js/theme-toggle.js"></script>

    <script src="js/storage.js"></script>
    <script src="js/journal.js"></script>
  </body>
</html>
